<!DOCTYPE html>
<html>
<head>
    <title>3D Periodic Table</title>
    <style>
        html, body { height: 100%; }

        body {
            background-color: #000;
            margin: 0;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        a { color: #fff; }

        /* ── Top title ── */
        #info {
            position: absolute;
            width: 100%;
            color: #fff;
            padding: 5px;
            margin-top: 18px;
            font-family: Monospace;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        /* ── Bottom menu ── */
        #menu {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        button {
            color: rgba(127,255,255,.75);
            background: transparent;
            outline: 1px solid rgba(127,255,255,.75);
            border: 0;
            padding: 5px 10px;
            cursor: pointer;
            margin: 0 4px;
            font-size: 14px;
            font-family: Monospace;
        }
        button:hover  { background-color: rgba(0,255,255,.5); }
        button:active { color:#000; background-color:rgba(0,255,255,.75); }

        /* ── Legend ── */
        #legend {
            position: absolute;
            top: 55px;
            right: 12px;
            z-index: 10;
            background: rgba(0,0,0,.7);
            border: 1px solid rgba(127,255,255,.3);
            border-radius: 6px;
            padding: 8px 12px;
            font-family: Monospace;
            font-size: 11px;
            line-height: 1.9;
            color: rgba(200,230,255,.85);
        }
        #legend h4 {
            margin: 0 0 5px 0;
            font-size: 11px;
            color: rgba(0,255,255,.9);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .leg { display:flex; align-items:center; gap:7px; }
        .leg-dot { width:9px; height:9px; border-radius:2px; flex-shrink:0; }

        /* ── Element cards ── */
        .element {
            width: 140px;
            height: 180px;
            border: 1px solid rgba(127,255,255,.25);
            cursor: pointer;
            transition: box-shadow .15s, border-color .15s;
            position: relative;
        }
        .element:hover {
            box-shadow: 0 0 25px var(--gc, rgba(0,255,255,.8)) !important;
            border-color: var(--bc, rgba(127,255,255,.8)) !important;
        }
        .element .number {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 20px;
            color: rgba(127,255,255,.75);
        }
        .element .symbol {
            position: absolute;
            top: 40px;
            width: 100%;
            font-size: 70px;
            text-align: center;
            color: rgba(255,255,255,.75);
            font-weight: bold;
            filter: drop-shadow(0 0 18px rgba(0,255,255,.9));
        }
        .element .details {
            position: absolute;
            top: 130px;
            width: 100%;
            font-size: 16px;
            text-align: center;
            color: rgba(127,255,255,.75);
            line-height: 1.4;
        }

        /* ── POPUP ── */
        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.65);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        #overlay.show { display: flex; }

        #popup {
            width: 360px;
            max-width: 92vw;
            background: #040f1e;
            border: 1px solid var(--pc, rgba(0,255,255,.5));
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 50px var(--ps, rgba(0,255,255,.2));
            animation: popIn .25s ease;
            position: relative;
        }
        @keyframes popIn {
            from { transform: scale(.88); opacity:0; }
            to   { transform: scale(1);  opacity:1; }
        }

        #pop-header {
            display: flex;
            gap: 16px;
            padding: 20px 20px 16px;
            border-bottom: 1px solid rgba(255,255,255,.06);
        }
        #pop-symbol-box {
            width: 84px;
            height: 96px;
            flex-shrink: 0;
            border: 1px solid var(--pc, rgba(0,255,255,.4));
            border-radius: 6px;
            background: rgba(0,0,0,.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #pop-anum {
            font-family: Monospace;
            font-size: 13px;
            color: rgba(180,210,255,.6);
        }
        #pop-sym {
            font-family: Arial Black, Arial, sans-serif;
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            line-height: 1;
            filter: drop-shadow(0 0 10px var(--pc, rgba(0,255,255,.9)));
        }
        #pop-info { flex:1; padding-top:4px; }
        #pop-name {
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 6px;
        }
        #pop-cat {
            display: inline-block;
            font-family: Monospace;
            font-size: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 3px 9px;
            border-radius: 20px;
            border: 1px solid var(--pc, rgba(0,255,255,.5));
            color: var(--pc, rgba(0,255,255,.9));
            margin-bottom: 8px;
        }
        #pop-mass-label {
            font-family: Monospace;
            font-size: 12px;
            color: rgba(150,190,230,.65);
        }
        #pop-mass-val {
            font-family: Monospace;
            font-size: 15px;
            color: rgba(220,240,255,.9);
        }
        #pop-close {
            position: absolute;
            top: 12px; right: 12px;
            width: 26px; height: 26px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,.25);
            background: rgba(255,255,255,.07);
            color: rgba(255,255,255,.65);
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
        }
        #pop-close:hover { background: rgba(255,255,255,.18); color:#fff; }

        #pop-body { padding: 14px 20px 20px; }

        .pop-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,.04);
            font-family: Monospace;
            font-size: 13px;
        }
        .pop-row:last-of-type { border-bottom: none; }
        .pop-lbl { color: rgba(140,180,220,.6); font-size: 11px; text-transform:uppercase; letter-spacing:.8px; }
        .pop-val { color: rgba(220,240,255,.9); font-weight:bold; }

        #pop-desc {
            margin-top: 12px;
            padding: 10px 12px;
            background: rgba(0,200,220,.05);
            border-left: 2px solid var(--pc, rgba(0,255,255,.4));
            border-radius: 0 4px 4px 0;
            font-family: Monospace;
            font-size: 12px;
            color: rgba(160,200,240,.75);
            line-height: 1.65;
        }
    </style>
</head>

        ["Es", "Einsteinium",  "(252)",     14,10,"actinide",      "Named after Einstein. First discovered in the fallout of the first hydrogen bomb test in 1952."],
        ["Fm", "Fermium",      "(257)",     15,10,"actinide",      "Named after Enrico Fermi. Also found in H-bomb fallout. No commercial uses."],
        ["Md", "Mendelevium",  "(258)",     16,10,"actinide",      "Named after Dmitri Mendeleev, creator of the periodic table."],
        ["No", "Nobelium",     "(259)",     17,10,"actinide",      "Named after Alfred Nobel. Synthetic and highly unstable."],
        ["Lr", "Lawrencium",   "(262)",     18,10,"actinide",      "Named after Ernest Lawrence. The last actinide element in the table."],
        ["Rf", "Rutherfordium","(267)",     4, 7, "transition",    "Named after Ernest Rutherford. Synthetic superheavy element produced in particle accelerators."],
        ["Db", "Dubnium",      "(268)",     5, 7, "transition",    "Named after Dubna, Russia. Highly radioactive synthetic element."],
        ["Sg", "Seaborgium",   "(271)",     6, 7, "transition",    "Named after Glenn Seaborg. Only a few atoms produced; very short half-life."],
        ["Bh", "Bohrium",      "(272)",     7, 7, "transition",    "Named after Niels Bohr. Extremely unstable; only a handful of atoms ever made."],
        ["Hs", "Hassium",      "(270)",     8, 7, "transition",    "Named after Hesse, Germany. Synthetic superheavy transactinide element."],
        ["Mt", "Meitnerium",   "(276)",     9, 7, "transition",    "Named after Lise Meitner. Only produced in heavy-ion particle accelerators."],
        ["Ds", "Darmstadtium", "(281)",     10,7, "transition",    "Named after Darmstadt, Germany. Extremely unstable synthetic element."],
        ["Rg", "Roentgenium",  "(280)",     11,7, "transition",    "Named after Wilhelm Röntgen, discoverer of X-rays. Synthetic superheavy element."],
        ["Cn", "Copernicium",  "(285)",     12,7, "transition",    "Named after Copernicus. Predicted to behave more like a noble gas than a metal."],
        ["Nh", "Nihonium",     "(284)",     13,7, "post-trans",    "Named after Japan (Nihon). First element discovered in Asia, at RIKEN institute."],
        ["Fl", "Flerovium",    "(289)",     14,7, "post-trans",    "Named after Flerov Laboratory. May behave like a noble gas despite being in group 14."],
        ["Mc", "Moscovium",    "(288)",     15,7, "post-trans",    "Named after Moscow Oblast, Russia. Has an extremely short half-life of ~220 ms."],
        ["Lv", "Livermorium",  "(293)",     16,7, "post-trans",    "Named after Lawrence Livermore National Laboratory. Highly radioactive."],
        ["Ts", "Tennessine",   "(294)",     17,7, "halogen",       "Named after Tennessee. Second heaviest known element. Extremely radioactive."],
        ["Og", "Oganesson",    "(294)",     18,7, "noble-gas",     "Heaviest known element. Named after physicist Yuri Oganessian. Half-life ~0.89 ms."]
    ];

    // ── Category colours ──────────────────────────────────────────────────────
    var CAT = {
        "nonmetal":       { bg:"rgba(0,55,75,",      border:"rgba(0,229,255,",     glow:"rgba(0,229,255,0.7)",    dot:"#00e5ff",   label:"Nonmetal" },
        "alkali-metal":   { bg:"rgba(75,10,10,",     border:"rgba(255,107,107,",   glow:"rgba(255,107,107,0.7)",  dot:"#ff6b6b",   label:"Alkali Metal" },
        "alkaline-earth": { bg:"rgba(65,38,0,",      border:"rgba(255,159,67,",    glow:"rgba(255,159,67,0.7)",   dot:"#ff9f43",   label:"Alkaline Earth Metal" },
        "transition":     { bg:"rgba(28,18,72,",     border:"rgba(162,155,254,",   glow:"rgba(162,155,254,0.7)",  dot:"#a29bfe",   label:"Transition Metal" },
        "post-trans":     { bg:"rgba(0,28,65,",      border:"rgba(116,185,255,",   glow:"rgba(116,185,255,0.7)",  dot:"#74b9ff",   label:"Post-Transition Metal" },
        "metalloid":      { bg:"rgba(0,55,38,",      border:"rgba(85,239,196,",    glow:"rgba(85,239,196,0.7)",   dot:"#55efc4",   label:"Metalloid" },
        "halogen":        { bg:"rgba(65,10,38,",     border:"rgba(253,121,168,",   glow:"rgba(253,121,168,0.7)",  dot:"#fd79a8",   label:"Halogen" },
        "noble-gas":      { bg:"rgba(0,55,55,",      border:"rgba(129,236,236,",   glow:"rgba(129,236,236,0.7)",  dot:"#81ecec",   label:"Noble Gas" },
        "lanthanide":     { bg:"rgba(48,42,0,",      border:"rgba(255,234,167,",   glow:"rgba(255,234,167,0.7)",  dot:"#ffeaa7",   label:"Lanthanide" },
        "actinide":       { bg:"rgba(58,18,8,",      border:"rgba(250,177,160,",   glow:"rgba(250,177,160,0.7)",  dot:"#fab1a0",   label:"Actinide" }
    };

    // ── Scene setup ───────────────────────────────────────────────────────────
    var camera, scene, renderer, controls;
    var objects = [];
    var targets = { table:[], sphere:[], helix:[], grid:[] };

    init();
    animate();

    function init() {
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 1, 5000);
        camera.position.z = 1800;

        scene = new THREE.Scene();

        for (var i = 0; i < table.length; i++) {
            var item = table[i];
            var cs   = CAT[item[5]] || CAT["nonmetal"];
            var alpha = (Math.random() * 0.35 + 0.35).toFixed(2);

            var el = document.createElement('div');
            el.className = 'element';
            el.style.backgroundColor = cs.bg + alpha + ')';
            el.style.boxShadow       = '0 0 16px ' + cs.glow;
            el.style.borderColor     = cs.border + '0.35)';
            el.style.setProperty('--gc', cs.glow);
            el.style.setProperty('--bc', cs.border + '0.85)');

            var num = document.createElement('div');
            num.className = 'number';
            num.textContent = i + 1;
            el.appendChild(num);

            var sym = document.createElement('div');
            sym.className = 'symbol';
            sym.textContent = item[0];
            el.appendChild(sym);

            var det = document.createElement('div');
            det.className = 'details';
            det.innerHTML = item[1] + '<br>' + item[2];
            el.appendChild(det);

            // click → popup (ignore drags)
            (function(elem, idx) {
                var startX, startY;
                elem.addEventListener('mousedown', function(e){ startX=e.clientX; startY=e.clientY; });
                elem.addEventListener('click', function(e){
                    var dx=e.clientX-startX, dy=e.clientY-startY;
                    if (Math.sqrt(dx*dx+dy*dy) < 6) {
                        e.stopPropagation();
                        showPopup(idx);
                    }
                });
            })(el, i);

            var obj = new THREE.CSS3DObject(el);
            obj.position.x = Math.random()*4000-2000;
            obj.position.y = Math.random()*4000-2000;
            obj.position.z = Math.random()*4000-2000;
            scene.add(obj);
            objects.push(obj);
        }

        // TABLE
        for (var i=0; i<objects.length; i++) {
            var item=table[i], t=new THREE.Object3D();
            t.position.x = (item[3]*160)-1540;
            t.position.y = -(item[4]*200)+1100;
            targets.table.push(t);
        }

        // SPHERE
        var v=new THREE.Vector3();
        for (var i=0,l=objects.length; i<l; i++) {
            var phi=Math.acos(-1+(2*i)/l), theta=Math.sqrt(l*Math.PI)*phi;
            var t=new THREE.Object3D();
            t.position.x=1000*Math.cos(theta)*Math.sin(phi);
            t.position.y=1000*Math.sin(theta)*Math.sin(phi);
            t.position.z=1000*Math.cos(phi);
            v.copy(t.position).multiplyScalar(2);
            t.lookAt(v);
            targets.sphere.push(t);
        }

        // HELIX
        for (var i=0,l=objects.length; i<l; i++) {
            var phi=i*0.175+Math.PI;
            var t=new THREE.Object3D();
            t.position.x=1100*Math.sin(phi);
            t.position.y=-(i*8)+450;
            t.position.z=1100*Math.cos(phi);
            v.copy(t.position); v.x*=2; v.z*=2;
            t.lookAt(v);
            targets.helix.push(t);
        }

        // GRID
        for (var i=0; i<objects.length; i++) {
            var t=new THREE.Object3D();
            t.position.x=((i%5)*400)-800;
            t.position.y=(-(Math.floor(i/5)%5)*400)+800;
            t.position.z=(Math.floor(i/25))*1000-2000;
            targets.grid.push(t);
        }

        renderer = new THREE.CSS3DRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.position = 'absolute';
        renderer.domElement.style.top = 0;
        document.getElementById('container').appendChild(renderer.domElement);

        controls = new THREE.TrackballControls(camera, renderer.domElement);
        controls.rotateSpeed = 0.5;
        controls.addEventListener('change', render);

        document.getElementById('table').addEventListener('click', function(){ transform(targets.table,2000); });
        document.getElementById('sphere').addEventListener('click', function(){ transform(targets.sphere,2000); });
        document.getElementById('helix').addEventListener('click', function(){ transform(targets.helix,2000); });
        document.getElementById('grid').addEventListener('click', function(){ transform(targets.grid,2000); });

        transform(targets.table, 5000);
        window.addEventListener('resize', onWindowResize, false);
    }

    // ── Popup ─────────────────────────────────────────────────────────────────
    function showPopup(idx) {
        var item = table[idx];
        var cs   = CAT[item[5]] || CAT["nonmetal"];
        var color = cs.border + '0.7)';

        var popup = document.getElementById('popup');
        popup.style.setProperty('--pc', color);
        popup.style.setProperty('--ps', cs.border + '0.2)');

        document.getElementById('pop-anum').textContent   = idx + 1;
        document.getElementById('pop-sym').textContent    = item[0];
        document.getElementById('pop-name').textContent   = item[1];
        document.getElementById('pop-cat').textContent    = cs.label;
        document.getElementById('pop-cat').style.color    = cs.dot;
        document.getElementById('pop-cat').style.borderColor = cs.dot;
        document.getElementById('pop-mass-val').textContent  = item[2] + ' u';
        document.getElementById('pop-group').textContent  = item[3];
        document.getElementById('pop-period').textContent = item[4];
        document.getElementById('pop-z').textContent      = idx + 1;
        document.getElementById('pop-cat2').textContent   = cs.label;
        document.getElementById('pop-desc').textContent   = item[6] || '';

        document.getElementById('overlay').classList.add('show');
        controls.enabled = false;
    }

    function hidePopup() {
        document.getElementById('overlay').classList.remove('show');
        controls.enabled = true;
    }

    document.getElementById('pop-close').addEventListener('click', hidePopup);
    document.getElementById('overlay').addEventListener('click', function(e){ if(e.target===this) hidePopup(); });
    document.addEventListener('keydown', function(e){ if(e.key==='Escape') hidePopup(); });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function transform(targets, duration) {
        TWEEN.removeAll();
        for (var i=0; i<objects.length; i++) {
            var obj=objects[i], tgt=targets[i];
            new TWEEN.Tween(obj.position)
                .to({x:tgt.position.x, y:tgt.position.y, z:tgt.position.z}, Math.random()*duration+duration)
                .easing(TWEEN.Easing.Exponential.InOut).start();
            new TWEEN.Tween(obj.rotation)
                .to({x:tgt.rotation.x, y:tgt.rotation.y, z:tgt.rotation.z}, Math.random()*duration+duration)
                .easing(TWEEN.Easing.Exponential.InOut).start();
        }
        new TWEEN.Tween(this).to({}, duration*2).onUpdate(render).start();
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        TWEEN.update();
        controls.update();
    }

    function render() {
        renderer.render(scene, camera);
    }

    </script>
</body>
</html>
